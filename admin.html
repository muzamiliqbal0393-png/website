<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Abu Ahil Workshop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: white; }
        
        .header { background: linear-gradient(135deg, #111, #1a1a1a); padding: 1rem 2rem; box-shadow: 0 4px 20px rgba(255,215,0,0.1); }
        .header h1 { color: #FFD700; font-weight: 700; }
        
        .container { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; margin-bottom: 3rem; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 15px; text-align: center; backdrop-filter: blur(10px); border: 1px solid rgba(255,215,0,0.2); }
        .stat-number { font-size: 2.5rem; font-weight: 700; color: #FFD700; }
        .stat-label { color: #ccc; font-size: 1.1rem; margin-top: 0.5rem; }
        
        .table-container { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 2rem; backdrop-filter: blur(10px); border: 1px solid rgba(255,215,0,0.2); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { background: rgba(255,215,0,0.1); color: #FFD700; font-weight: 600; }
        tr:hover { background: rgba(255,215,0,0.05); }
        .delete-btn { background: #dc3545; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .delete-btn:hover { background: #c82333; transform: translateY(-1px); }
        
        .loading { text-align: center; padding: 3rem; color: #ccc; }
        .empty { text-align: center; padding: 3rem; color: #999; }
        
        @media (max-width: 768px) {
            .container { padding: 0 1rem; }
            .stats { grid-template-columns: 1fr; }
            table { font-size: 0.9rem; }
            th, td { padding: 0.5rem; }
        }
    </style>
</head>
<body>
        <div class="header">
            <h1><i class="fas fa-cogs"></i> Al-Hadid Welding Admin Dashboard</h1>
            <button onclick="logout()" style="position: absolute; top: 1rem; right: 2rem; background: #dc3545; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 25px; font-weight: 600; cursor: pointer;">Logout</button>
        </div>
    
    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalInquiries">0</div>
                <div class="stat-label">Total Inquiries</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todayInquiries">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pending">0</div>
                <div class="stat-label">Unread</div>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div style="background: rgba(255,255,255,0.05); border-radius: 15px; padding: 1rem; margin-bottom: 2rem; border: 1px solid rgba(255,215,0,0.2);">
            <button class="tab-btn active" onclick="showTab('inquiries')" style="background: #FFD700; color: #111; padding: 0.8rem 2rem; border: none; border-radius: 10px; margin-right: 0.5rem; font-weight: 600; cursor: pointer;">📧 Inquiries</button>
            <button class="tab-btn" onclick="showTab('gallery')" style="background: rgba(255,255,255,0.1); color: white; padding: 0.8rem 2rem; border: 1px solid rgba(255,215,0,0.3); border-radius: 10px; margin-right: 0.5rem; font-weight: 600; cursor: pointer;">🖼️ Gallery</button>
            <button class="tab-btn" onclick="showTab('services')" style="background: rgba(255,255,255,0.1); color: white; padding: 0.8rem 2rem; border: 1px solid rgba(255,215,0,0.3); border-radius: 10px; font-weight: 600; cursor: pointer;">⚙️ Services</button>
        </div>

        <!-- Inquiries Tab -->
        <div id="inquiries-tab" class="tab-content active">
            <div class="table-container">
                <h2 style="margin-bottom: 1.5rem; color: #FFD700;"><i class="fas fa-envelope"></i> Customer Inquiries</h2>
                <div id="inquiriesList" class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading inquiries...
                </div>
            </div>
        </div>

        <!-- Gallery Tab -->
        <div id="gallery-tab" class="tab-content" style="display: none;">
            <div class="table-container">
                <h2 style="margin-bottom: 1.5rem; color: #FFD700;"><i class="fas fa-images"></i> Gallery Management</h2>
                <!-- Upload Form -->
                <div style="background: rgba(255,215,0,0.1); padding: 2rem; border-radius: 10px; margin-bottom: 2rem; border: 1px solid rgba(255,215,0,0.3);">
                    <h3 style="color: #FFD700; margin-bottom: 1rem;">📤 Upload New Image</h3>
                    <form id="galleryForm" enctype="multipart/form-data" style="display: grid; grid-template-columns: 1fr 200px; gap: 1rem; max-width: 600px;">
                        <input type="text" id="galleryTitle" placeholder="Image Title" required style="padding: 1rem; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; background: rgba(255,255,255,0.05); color: white;">
                        <select id="galleryCategory" style="padding: 1rem; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; background: rgba(255,255,255,0.05); color: white;">
                            <option value="">Select Category</option>
                            <option value="steel">Steel Fabrication</option>
                            <option value="gates">Gates & Fences</option>
                            <option value="repair">Repair</option>
                            <option value="custom">Custom Ironwork</option>
                            <option value="industrial">Industrial</option>
                            <option value="aluminum">Aluminum</option>
                        </select>
                        <input type="text" id="galleryDesc" placeholder="Description (optional)" style="padding: 1rem; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; background: rgba(255,255,255,0.05); color: white; grid-column: 1 / -1;">
                        <input type="file" id="galleryImage" accept="image/*" required style="padding: 1rem; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; background: rgba(255,255,255,0.05); color: white; grid-column: 1 / -1;">
                        <button type="submit" style="background: #FFD700; color: #111; padding: 1rem 2rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; grid-column: 1 / -1;">Upload Image</button>
                    </form>
                    <div id="uploadMsg"></div>
                </div>
                <!-- Gallery List -->
                <h3 style="color: #FFD700; margin-bottom: 1rem;">📸 Gallery Images</h3>
                <div id="galleryList" class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading gallery...
                </div>
            </div>
        </div>

        <!-- Services Tab -->
        <div id="services-tab" class="tab-content" style="display: none;">
            <div class="table-container">
                <h2 style="margin-bottom: 1.5rem; color: #FFD700;"><i class="fas fa-cogs"></i> Services Management</h2>
                <!-- Add Service Form -->
                <div style="background: rgba(255,215,0,0.1); padding: 2rem; border-radius: 10px; margin-bottom: 2rem; border: 1px solid rgba(255,215,0,0.3);">
                    <h3 style="color: #FFD700; margin-bottom: 1rem;">➕ Add New Service</h3>
                    <form id="serviceForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; max-width: 800px;">
                        <input type="text" id="serviceTitle" placeholder="Service Title" required style="padding: 1rem; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; background: rgba(255,255,255,0.05); color: white;">
                        <select id="serviceCategory" style="padding: 1rem; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; background: rgba(255,255,255,0.05); color: white;">
                            <option value="">Category</option>
                            <option value="steel">Steel Fabrication</option>
                            <option value="gates">Gates & Fences</option>
                            <option value="repair">Repair</option>
                            <option value="custom">Custom</option>
                            <option value="industrial">Industrial</option>
                            <option value="aluminum">Aluminum</option>
                        </select>
                        <input type="text" id="serviceDesc" placeholder="Description" required style="grid-column: 1 / -1; padding: 1rem; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; background: rgba(255,255,255,0.05); color: white;">
                        <input type="text" id="servicePrice" placeholder="Price (e.g. 'Starting SAR 1000')" style="padding: 1rem; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; background: rgba(255,255,255,0.05); color: white;">
                        <label style="grid-column: 1 / -1;">
                            <input type="checkbox" id="serviceFeatured"> Featured on homepage
                        </label>
                        <input type="number" id="serviceOrder" placeholder="Order (lower first)" min="0" style="padding: 1rem; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; background: rgba(255,255,255,0.05); color: white;">
                        <button type="submit" style="grid-column: 1 / -1; background: #FFD700; color: #111; padding: 1rem 2rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Add Service</button>
                    </form>
                    <div id="serviceMsg"></div>
                </div>
                <!-- Services List -->
                <h3 style="color: #FFD700; margin-bottom: 1rem;">⚙️ All Services</h3>
                <div id="servicesList" class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading services...
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        const headers = {
            'Authorization': `Bearer ${token}`
        };
        
        // Check auth on load
        if (!token) {
            window.location.href = '/admin/login';
        }
        
        // Load inquiries
        async function loadInquiries() {
            try {
                const response = await fetch(`${API_BASE}/inquiries`, { headers });
                const inquiries = await response.json();
                
                document.getElementById('totalInquiries').textContent = inquiries.length;
                document.getElementById('todayInquiries').textContent = inquiries.filter(i => 
                    new Date(i.createdAt).toDateString() === new Date().toDateString()
                ).length;
                
                const list = document.getElementById('inquiriesList');
                if (inquiries.length === 0) {
                    list.innerHTML = '<div class="empty">No inquiries yet</div>';
                    return;
                }
                
                list.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Name</th>
                                <th>Phone</th>
                                <th>Service</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${inquiries.map(inquiry => `
                                <tr>
                                    <td>${new Date(inquiry.createdAt).toLocaleDateString()}</td>
                                    <td>${inquiry.name}</td>
                                    <td><a href="tel:${inquiry.phone}">${inquiry.phone}</a></td>
                                    <td>${inquiry.service}</td>
                                    <td>${inquiry.read ? 'Read' : 'Unread'}</td>
                                    <td><button class="delete-btn" onclick="deleteInquiry('${inquiry._id}')">Delete</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                if (error.message.includes('401') || error.message.includes('403')) {
                    localStorage.removeItem('adminToken');
                    window.location.href = '/admin/login';
                }
                document.getElementById('inquiriesList').innerHTML = '<div class="empty">Auth error - login again</div>';
            }
        }
        
        async function deleteInquiry(id) {
            if (confirm('Delete this inquiry?')) {
                try {
                    await fetch(`${API_BASE}/inquiries/${id}`, { 
                        method: 'DELETE',
                        headers 
                    });
                    loadInquiries();
                } catch (error) {
                    alert('Error deleting');
                }
            }
        }
        
        // Load on page load
        loadInquiries();
        
        // Auto refresh inquiries
        setInterval(loadInquiries, 30000);

        // ==================== GALLERY FUNCTIONS ====================
        
        function showTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            // Show selected
            document.getElementById(tabName + '-tab').style.display = 'block';
            event.target.classList.add('active');
            
            if (tabName === 'gallery') loadGalleries();
            if (tabName === 'services') loadServices();
        }
        
        async function loadGalleries() {
            try {
                const response = await fetch('/api/gallery', { headers });
                const galleries = await response.json();
                
                const list = document.getElementById('galleryList');
                if (galleries.length === 0) {
                    list.innerHTML = '<div class="empty">No gallery images yet</div>';
                    return;
                }
                
                list.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${galleries.map(gallery => `
                                <tr>
                                    <td><img src="/${gallery.image}" style="width: 80px; height: 60px; object-fit: cover; border-radius: 5px;" alt="${gallery.title}"></td>
                                    <td>${gallery.title}</td>
                                    <td><span style="background: rgba(255,215,0,0.2); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem;">${gallery.category}</span></td>
                                    <td>${new Date(gallery.createdAt).toLocaleDateString()}</td>
                                    <td><button class="delete-btn" onclick="deleteGallery('${gallery._id}')">Delete</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                document.getElementById('galleryList').innerHTML = '<div class="empty">Error loading gallery</div>';
            }
        }
        
        async function uploadGallery(e) {
            e.preventDefault();
            const formData = new FormData();
            formData.append('title', document.getElementById('galleryTitle').value);
            formData.append('category', document.getElementById('galleryCategory').value);
            formData.append('description', document.getElementById('galleryDesc').value);
            formData.append('image', document.getElementById('galleryImage').files[0]);
            
            const uploadMsg = document.getElementById('uploadMsg');
            uploadMsg.textContent = 'Uploading...';
            uploadMsg.style.color = '#FFD700';
            
            try {
                const response = await fetch('/api/gallery/upload', {
                    method: 'POST',
                    headers,
                    body: formData
                });
                
                const data = await response.json();
                if (data.success) {
                    uploadMsg.textContent = '✅ Image uploaded!';
                    uploadMsg.style.color = '#28a745';
                    document.getElementById('galleryForm').reset();
                    loadGalleries();
                } else {
                    uploadMsg.textContent = '❌ Upload failed: ' + data.error;
                    uploadMsg.style.color = '#dc3545';
                }
            } catch (error) {
                uploadMsg.textContent = '❌ Error: ' + error.message;
                uploadMsg.style.color = '#dc3545';
            }
        }
        
        async function deleteGallery(id) {
            if (confirm('Delete this image?')) {
                try {
                    await fetch(`/api/gallery/${id}`, { 
                        method: 'DELETE',
                        headers 
                    });
                    loadGalleries();
                } catch (error) {
                    alert('Error deleting');
                }
            }
        }
        
        // Gallery form submit
        document.getElementById('galleryForm').addEventListener('submit', uploadGallery);
        
        // ==================== SERVICES FUNCTIONS ====================
        
        async function loadServices() {
            try {
                const response = await fetch('/api/services/admin', { headers });
                const services = await response.json();
                
                const list = document.getElementById('servicesList');
                if (services.length === 0) {
                    list.innerHTML = '<div class="empty">No services yet</div>';
                    return;
                }
                
                list.innerHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Price</th>
                                <th>Featured</th>
                                <th>Order</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${services.map(service => `
                                <tr>
                                    <td>${service.title}</td>
                                    <td>${service.category}</td>
                                    <td>${service.price || 'N/A'}</td>
                                    <td>${service.featured ? '⭐' : '❌'}</td>
                                    <td>${service.order}</td>
                                    <td>
                                        <button class="delete-btn" onclick="deleteService('${service._id}')" style="padding: 0.3rem 0.8rem; font-size: 0.8rem;">Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                document.getElementById('servicesList').innerHTML = '<div class="empty">Error loading services</div>';
            }
        }
        
        async function addService(e) {
            e.preventDefault();
            const serviceData = {
                title: document.getElementById('serviceTitle').value,
                category: document.getElementById('serviceCategory').value,
                description: document.getElementById('serviceDesc').value,
                price: document.getElementById('servicePrice').value,
                featured: document.getElementById('serviceFeatured').checked,
                order: document.getElementById('serviceOrder').value || 0
            };
            
            const serviceMsg = document.getElementById('serviceMsg');
            serviceMsg.textContent = 'Adding...';
            serviceMsg.style.color = '#FFD700';
            
            try {
                const response = await fetch('/api/services/admin', {
                    method: 'POST',
                    headers: { ...headers, 'Content-Type': 'application/json' },
                    body: JSON.stringify(serviceData)
                });
                
                const data = await response.json();
                if (data.success) {
                    serviceMsg.textContent = '✅ Service added!';
                    serviceMsg.style.color = '#28a745';
                    document.getElementById('serviceForm').reset();
                    loadServices();
                } else {
                    serviceMsg.textContent = '❌ Error: ' + data.error;
                    serviceMsg.style.color = '#dc3545';
                }
            } catch (error) {
                serviceMsg.textContent = '❌ Network error';
                serviceMsg.style.color = '#dc3545';
            }
        }
        
        async function deleteService(id) {
            if (confirm('Delete this service?')) {
                try {
                    await fetch(`/api/services/admin/${id}`, { 
                        method: 'DELETE',
                        headers 
                    });
                    loadServices();
                } catch (error) {
                    alert('Error deleting');
                }
            }
        }
        
        // Service form
        document.getElementById('serviceForm').addEventListener('submit', addService);
        
        function logout() {
            localStorage.clear();
            window.location.href = '/admin/login';
        }
        
        // Tab styles
        const style = document.createElement('style');
        style.textContent = `
            .tab-btn.active { background: #FFD700 !important; color: #111 !important; }
            .tab-content { transition: opacity 0.3s; }
            .tab-btn:hover { background: rgba(255,215,0,0.3) !important; }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
